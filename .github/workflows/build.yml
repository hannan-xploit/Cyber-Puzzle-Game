name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    # Environment variables yahan set karne se buildozer kabhi prompt nahi karega
    env:
      BUILDOZER_ALLOW_ROOT: "1"
      ANDROIDSDK_ACCEPT_LICENSE: "1"
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          # Chown hata diya hai kyunki container mein zarurat nahi
          buildozer -v android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
